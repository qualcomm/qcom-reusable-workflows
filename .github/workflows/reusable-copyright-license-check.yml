name: Copyright License Check Reusable Workflow
on:
  workflow_call:

permissions:
  contents: read
  
jobs:
  run-copyright-license-check:
    if: ${{ github.event_name == 'pull_request' && github.event.action != 'closed' }}
    name: Run Copyright License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Check out the PR's actual head commit (not the synthetic merge ref).
          # This avoids failures when the PR has merge conflicts, and ensures
          # the diff matches exactly what GitHub shows in the PR UI.
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch base branch
        run: |
          git fetch --no-tags --prune origin \
            "+refs/heads/${{ github.event.pull_request.base.ref }}:refs/remotes/origin/${{ github.event.pull_request.base.ref }}"

      - name: Generate patch for PR changes only (GitHub PR-style 3-dot diff)
        run: |
          BASE="origin/${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # GitHub PRs show a three-dot diff: merge-base(base, head) -> head.
          # Using the live base branch tip (not the stale SHA from the event
          # payload) ensures the patch always matches the GitHub PR UI diff.

          git diff "${BASE}...${HEAD}" > pr.patch
          head -n 100 pr.patch

      - name: Run Copyright License Check Action
        uses: qualcomm/copyright-license-checker-action@v1.1.0
        with:
          patch_file: pr.patch
          repo_name: ${{ github.repository }}
