name: Qualcomm Preflight Checks Reusable Workflow
on:
  workflow_call:
    inputs:
      repolinter:
        required: false
        type: boolean
        default: true
      semgrep: 
        required: false
        type: boolean
        default: true
      copyright-license-detector:
        required: false
        type: boolean
        default: true
      pr-check-emails:
        required: false
        type: boolean
        default: true
      dependency-review:
        required: false
        type: boolean
        default: true  
    secrets:
      SEMGREP_APP_TOKEN:
        required: true
        
permissions:
  contents: read
  security-events: write
  pull-requests: write
  
jobs:
  repolinter:
    if: ${{ inputs.repolinter }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Verify repolinter config file is present
        id: check_files
        uses: andstor/file-existence-action@v3
        with:
          files: "repolint.json"
      - name: Run Repolinter with local repolint.json
        if: steps.check_files.outputs.files_exists == 'true'
        uses: todogroup/repolinter-action@v1
        with:
          config_file: "repolint.json"
      - name: Run Repolinter with default ruleset
        if: steps.check_files.outputs.files_exists == 'false'
        uses: todogroup/repolinter-action@v1
        with:
          config_url: "https://raw.githubusercontent.com/qualcomm/.github/main/repolint.json"

  semgrep-static-analysis:
    if: ${{ ( inputs.semgrep && contains('pull_request_target', github.event_name) && github.event.action != 'closed' && github.actor != 'dependabot[bot]' ) }}
    name: semgrep/ci
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep:1.125.0
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --sarif-output=semgrep-report.sarif --json-output=semgrep-report.json || echo "Semgrep found issues"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF file for GitHub Advanced Security Dashboard
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-report.sarif
          category: semgrep-scan
          
      - name: Upload Semgrep results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-json-report
          path: semgrep-report.json
          retention-days: 7
          
      - name: Process Semgrep results and comment on PR
        if: always()
        # Use a separate runner that has the necessary tools
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            
            try {
              // Check if the JSON output file exists
              if (fs.existsSync('semgrep-report.json')) {
                const semgrepReport = JSON.parse(fs.readFileSync('semgrep-report.json', 'utf8'));
                const findingsCount = semgrepReport.results ? semgrepReport.results.length : 0;
                
                let commentBody = '';
                
                if (findingsCount > 0) {
                  // Create a markdown summary of findings
                  commentBody = `## 🔍 Semgrep Security Analysis Results\n\n`;
                  commentBody += `⚠️ **${findingsCount} security issue(s) found in your code**\n\n`;
                  commentBody += `<details>\n<summary>Click to see detailed findings</summary>\n\n`;
                  
                  // Process each finding
                  for (const result of semgrepReport.results) {
                    commentBody += `### ❌ ${result.check_id}\n\n`;
                    commentBody += `**Severity:** ${result.extra.severity}\n\n`;
                    commentBody += `**File:** ${result.path}:${result.start.line}\n\n`;
                    commentBody += `**Description:** ${result.extra.message}\n\n`;
                    commentBody += `\`\`\`\n${result.extra.lines}\n\`\`\`\n\n---\n`;
                  }
                  
                  commentBody += `</details>\n\n`;
                  commentBody += `Please address these security issues before merging.`;
                  
                  // Limit comment size to avoid GitHub API limits
                  if (commentBody.length > 65000) {
                    commentBody = commentBody.substring(0, 64000);
                    commentBody += '\n\n... (output truncated due to size limits)\n\n';
                    commentBody += 'Too many issues to display in a comment. Please run Semgrep locally for complete results.';
                  }
                } else {
                  commentBody = `## ✅ Semgrep Security Analysis Results\n\n`;
                  commentBody += `No security issues found in your code. Great job!`;
                }
                
                // Post the comment to the PR
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: commentBody
                });
                
                // If there are findings, set the job status to reflect issues found
                if (findingsCount > 0) {
                  core.warning(`Semgrep found ${findingsCount} security issue(s) in your code. See PR comments for details.`);
                } else {
                  core.info(`No security issues found by Semgrep. Great job!`);
                }
              } else {
                core.info(`No Semgrep report found. Skipping PR comment.`);
              }
            } catch (error) {
              core.setFailed(`Error processing Semgrep results: ${error.message}`);
            }
      
      
  
  copyright-license-check:
    if: ${{ ( inputs.copyright-license-detector && contains('pull_request_target', github.event_name) && github.event.action != 'closed' ) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history so we can diff properly
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
 
      - name: Add PR base repo as remote and fetch it
        run: |
          git remote add upstream https://github.com/${{ github.event.pull_request.base.repo.full_name }}.git
          git fetch upstream
 
      - name: Generate final patch between base and head
        run: |
          git diff upstream/${{ github.event.pull_request.base.ref }} > pr.patch
          head -n 100 pr.patch

      - name: Run copyright/license detector
        uses: qualcomm/copyright-license-checker-action@v1.0.0
        with:
          patch_file: pr.patch
          repo_name: ${{ github.repository }}
  
  commit-emails-check:
    if: ${{ inputs.pr-check-emails }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check PR emails
        uses: qualcomm/commit-emails-check-action@v1.0.0

  dependency-review:
    if: ${{ inputs.dependency-review && github.event.repository.visibility == 'public' && (github.event_name == 'push' || github.event_name == 'pull_request_target') }}
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      - name: Set base ref and head ref
        id: setrefs
        run: |
          if [ "${{github.event_name}}" == "push" ]; then
            echo "base_ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request_target" ]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ steps.setrefs.outputs.base_ref }}
          head-ref: ${{ steps.setrefs.outputs.head_ref }}
          fail-on-severity: high  
