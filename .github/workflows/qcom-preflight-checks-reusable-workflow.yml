name: Qualcomm Preflight Checks Reusable Workflow
on:
  workflow_call:
    inputs:
      repolinter:
        required: false
        type: boolean
        default: true
      semgrep: 
        required: false
        type: boolean
        default: true
      copyright-license-detector:
        required: false
        type: boolean
        default: true
      pr-check-emails:
        required: false
        type: boolean
        default: true
      dependency-review:
        required: false
        type: boolean
        default: true  
    secrets:
      SEMGREP_APP_TOKEN:
        required: true
        
permissions:
  contents: read
  security-events: write
  pull-requests: write
  
jobs:
  repolinter:
    if: ${{ inputs.repolinter }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Verify repolinter config file is present
        id: check_files
        uses: andstor/file-existence-action@v3
        with:
          files: "repolint.json"
      - name: Run Repolinter with local repolint.json
        if: steps.check_files.outputs.files_exists == 'true'
        uses: todogroup/repolinter-action@v1
        with:
          config_file: "repolint.json"
      - name: Run Repolinter with default ruleset
        if: steps.check_files.outputs.files_exists == 'false'
        uses: todogroup/repolinter-action@v1
        with:
          config_url: "https://raw.githubusercontent.com/qualcomm/.github/main/repolint.json"

  semgrep-static-analysis:
    if: ${{ ( inputs.semgrep && contains('pull_request_target', github.event_name) && github.event.action != 'closed' && github.actor != 'dependabot[bot]' ) }}
    name: semgrep/ci
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep:1.125.0
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci --sarif-output=semgrep-report.sarif --json-output=semgrep-report.json || echo "Semgrep found issues"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF file for GitHub Advanced Security Dashboard
        if: ${{ github.event.repository.visibility == 'public' }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep-report.sarif
          category: semgrep-scan
          
      - name: Process Semgrep results and comment on PR
        if: always()
        run: |
          # Install jq for JSON processing
          apt-get update && apt-get install -y jq
          
          # Check if the JSON output file exists
          if [ -f "semgrep-report.json" ]; then
            # Process the JSON output to create a PR comment
            FINDINGS_COUNT=$(jq '.results | length' semgrep-report.json)
            
            if [ "$FINDINGS_COUNT" -gt 0 ]; then
              # Create a markdown summary of findings
              echo "## 🔍 Semgrep Security Analysis Results" > semgrep-comment.md
              echo "" >> semgrep-comment.md
              echo "⚠️ **$FINDINGS_COUNT security issue(s) found in your code**" >> semgrep-comment.md
              echo "" >> semgrep-comment.md
              echo "<details>" >> semgrep-comment.md
              echo "<summary>Click to see detailed findings</summary>" >> semgrep-comment.md
              echo "" >> semgrep-comment.md
              
              # Process each finding
              jq -r '.results[] | "### ❌ " + .check_id + "\n\n**Severity:** " + .extra.severity + "\n\n**File:** " + .path + ":" + (.start.line|tostring) + "\n\n**Description:** " + .extra.message + "\n\n```\n" + .extra.lines + "\n```\n\n---\n"' semgrep-report.json >> semgrep-comment.md
              
              echo "</details>" >> semgrep-comment.md
              echo "" >> semgrep-comment.md
              echo "Please address these security issues before merging." >> semgrep-comment.md
              
              # Limit comment size to avoid GitHub API limits
              if [ $(wc -c < semgrep-comment.md) -gt 65000 ]; then
                head -c 64000 semgrep-comment.md > semgrep-comment-truncated.md
                echo "\n\n... (output truncated due to size limits)\n\nToo many issues to display in a comment. Please run Semgrep locally for complete results." >> semgrep-comment-truncated.md
                mv semgrep-comment-truncated.md semgrep-comment.md
              fi
              
              # Install GitHub CLI
              apt-get install -y gh
              
              # Post the comment to the PR
              gh auth login --with-token <<< "$GITHUB_TOKEN"
              gh pr comment ${{ github.event.pull_request.number }} -F semgrep-comment.md -R ${{ github.repository }}
            else
              echo "No security issues found by Semgrep. Great job!"
            fi
          else
            echo "No Semgrep report found. Skipping PR comment."
          fi
        env:
          GITHUB_TOKEN: ${{ github.token }}
      
      
  
  copyright-license-check:
    if: ${{ ( inputs.copyright-license-detector && contains('pull_request_target', github.event_name) && github.event.action != 'closed' ) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history so we can diff properly
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
 
      - name: Add PR base repo as remote and fetch it
        run: |
          git remote add upstream https://github.com/${{ github.event.pull_request.base.repo.full_name }}.git
          git fetch upstream
 
      - name: Generate final patch between base and head
        run: |
          git diff upstream/${{ github.event.pull_request.base.ref }} > pr.patch
          head -n 100 pr.patch

      - name: Run copyright/license detector
        uses: qualcomm/copyright-license-checker-action@v1.0.0
        with:
          patch_file: pr.patch
          repo_name: ${{ github.repository }}
  
  commit-emails-check:
    if: ${{ inputs.pr-check-emails }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check PR emails
        uses: qualcomm/commit-emails-check-action@v1.0.0

  dependency-review:
    if: ${{ inputs.dependency-review && github.event.repository.visibility == 'public' && (github.event_name == 'push' || github.event_name == 'pull_request_target') }}
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
      - name: Set base ref and head ref
        id: setrefs
        run: |
          if [ "${{github.event_name}}" == "push" ]; then
            echo "base_ref=${{ github.event.before }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request_target" ]; then
            echo "base_ref=${{ github.event.pull_request.base.sha }}" >> $GITHUB_OUTPUT
            echo "head_ref=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          fi
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ steps.setrefs.outputs.base_ref }}
          head-ref: ${{ steps.setrefs.outputs.head_ref }}
          fail-on-severity: high  
